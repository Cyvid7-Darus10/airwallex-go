version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G404 # math/rand is used only for retry jitter, never for secrets
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
